<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#6B2034"/>
      <stop offset="45%" stop-color="#5C1A2B"/>
      <stop offset="100%" stop-color="#3F0F1C"/>
    </radialGradient>
    <pattern id="diamonds" x="0" y="0" width="38" height="38" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="38" height="38" fill="none"/>
      <path d="M0 0 L 38 0 M0 19 L 38 19" stroke="#FFFFFF" stroke-opacity="0.025" stroke-width="1"/>
      <path d="M0 0 L 0 38 M19 0 L 19 38" stroke="#FFFFFF" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>

    <symbol id="corner" viewBox="0 0 150 150">
      <g fill="none" stroke="#C9A961" stroke-width="1.6" stroke-linecap="round">
        <path d="M10 10 Q 60 12 75 60"/>
        <path d="M10 10 Q 12 60 60 75"/>
        <path d="M30 30 Q 55 35 70 70" opacity="0.5"/>
      </g>
      <g fill="#C9A961">
        <ellipse cx="55" cy="40" rx="8" ry="3" transform="rotate(-25 55 40)"/>
        <ellipse cx="40" cy="55" rx="8" ry="3" transform="rotate(-65 40 55)"/>
        <ellipse cx="68" cy="32" rx="6" ry="2.5" transform="rotate(-20 68 32)"/>
        <ellipse cx="32" cy="68" rx="6" ry="2.5" transform="rotate(-70 32 68)"/>
      </g>
      <g fill="#E8C5C5" stroke="#C9A961" stroke-width="1">
        <circle cx="80" cy="60" r="5"/>
        <circle cx="60" cy="80" r="5"/>
        <circle cx="88" cy="78" r="4"/>
        <circle cx="78" cy="88" r="4"/>
      </g>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#diamonds)"/>

  <!-- Frame -->
  <rect x="36" y="36" width="1008" height="1848" rx="4" ry="4" fill="none" stroke="#C9A961" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Corner ornaments -->
  <use href="#corner" x="24" y="24" width="150" height="150"/>
  <g transform="translate(1056 24) scale(-1 1)"><use href="#corner" width="150" height="150"/></g>
  <g transform="translate(24 1896) scale(1 -1)"><use href="#corner" width="150" height="150"/></g>
  <g transform="translate(1056 1896) scale(-1 -1)"><use href="#corner" width="150" height="150"/></g>

  <!-- EYEBROW -->
  <text x="540" y="200" text-anchor="middle" fill="#F5EBD8" font-size="22" letter-spacing="11" font-weight="500">FOR WOMEN  •  BY WOMEN</text>

  <!-- HEADLINE -->
  <g fill="#F5EBD8" font-weight="800" text-anchor="middle">
    <text x="540" y="295" font-size="92" letter-spacing="1">WOMEN'S</text>
    <text x="540" y="385" font-size="92" letter-spacing="1">SELF-DEFENSE</text>
    <text x="540" y="475" font-size="92" letter-spacing="1">&amp; FIREARM SAFETY</text>
    <text x="155" y="475" font-size="92" font-style="italic" fill="#C9A961" font-weight="800">&amp;</text>
  </g>

  <!-- Divider -->
  <rect x="495" y="510" width="90" height="2" fill="#C9A961"/>

  <!-- Subhead -->
  <g fill="#F5EBD8" font-size="30" text-anchor="middle" font-weight="500">
    <text x="540" y="560">Jujitsu and Handgun Safety Classes</text>
    <text x="540" y="600">for Women</text>
  </g>

  <!-- LEFT PANEL: JUJITSU - two women grip-fighting in gi -->
  <g transform="translate(90 670)">
    <rect width="425" height="425" rx="20" ry="20" fill="#F5EBD8"/>
    <!-- Subtle dojo floor -->
    <rect x="0" y="310" width="425" height="50" fill="#D9CDB2" opacity="0.7"/>
    <line x1="0" y1="312" x2="425" y2="312" stroke="#C9A961" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="332" x2="425" y2="332" stroke="#C9A961" stroke-width="0.8" opacity="0.3"/>
    <line x1="0" y1="352" x2="425" y2="352" stroke="#C9A961" stroke-width="0.8" opacity="0.3"/>

    <!-- LEFT FIGHTER (purple belt, facing right, attacking with collar grip) -->
    <g transform="translate(70 60)">
      <!-- Hair behind / ponytail down back -->
      <path d="M22 18 Q 8 32 10 70 Q 12 95 22 110 L 36 105 Q 32 80 35 60 Q 38 38 42 22 Z" fill="#2C1810"/>
      <!-- Head -->
      <ellipse cx="44" cy="34" rx="22" ry="24" fill="#E8B89A"/>
      <!-- Hair top -->
      <path d="M22 22 Q 44 6 66 22 Q 66 32 60 40 Q 56 22 44 20 Q 30 22 26 36 Q 22 30 22 22 Z" fill="#2C1810"/>
      <!-- Eye -->
      <ellipse cx="54" cy="34" rx="2.2" ry="2.8" fill="#1A0A12"/>
      <!-- Brow (determined) -->
      <path d="M50 28 L 60 28" stroke="#2C1810" stroke-width="2" stroke-linecap="round"/>
      <!-- Mouth -->
      <path d="M50 46 L 60 45" stroke="#5C1A2B" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <!-- Neck -->
      <rect x="36" y="54" width="16" height="14" fill="#E8B89A"/>

      <!-- GI back sleeve (left arm pulling opponent's sleeve back) -->
      <path d="M16 78 Q 0 95 -10 130 L 6 138 Q 18 110 28 88 Z" fill="#FBF3E0" stroke="#C8BFA5" stroke-width="1.2"/>
      <!-- left hand gripping (back arm) -->
      <ellipse cx="-4" cy="135" rx="10" ry="8" fill="#E8B89A"/>

      <!-- GI torso -->
      <path d="M22 70 Q 44 64 66 70 L 74 178 Q 72 184 66 186 L 22 186 Q 16 184 14 178 Z" fill="#FBF3E0" stroke="#C8BFA5" stroke-width="1.5"/>
      <!-- lapel V -->
      <path d="M30 70 L 44 116 L 58 70" fill="#E8DEC0" opacity="0.7"/>
      <path d="M30 70 L 44 116 L 58 70" fill="none" stroke="#C8BFA5" stroke-width="1.5"/>

      <!-- GI forward sleeve (right arm reaching across to grip opponent's collar) -->
      <path d="M64 78 Q 105 82 158 96 L 154 116 Q 100 102 60 92 Z" fill="#FBF3E0" stroke="#C8BFA5" stroke-width="1.2"/>
      <!-- right hand gripping opponent's lapel (will overlap onto opponent) -->
      <ellipse cx="160" cy="108" rx="11" ry="9" fill="#E8B89A"/>

      <!-- belt (PURPLE) -->
      <rect x="14" y="162" width="60" height="14" fill="#6B3F8A"/>
      <rect x="14" y="162" width="60" height="2" fill="#3F1F5C"/>
      <rect x="14" y="174" width="60" height="2" fill="#3F1F5C"/>
      <rect x="38" y="159" width="12" height="20" fill="#6B3F8A"/>
      <rect x="38" y="159" width="12" height="20" fill="none" stroke="#3F1F5C" stroke-width="1"/>

      <!-- GI pants -->
      <path d="M22 186 L 14 274 L 32 276 L 40 204 Z" fill="#FBF3E0" stroke="#C8BFA5" stroke-width="1.2"/>
      <path d="M48 204 L 56 276 L 74 274 L 66 186 Z" fill="#FBF3E0" stroke="#C8BFA5" stroke-width="1.2"/>
      <!-- feet -->
      <ellipse cx="24" cy="278" rx="12" ry="4" fill="#E8B89A"/>
      <ellipse cx="65" cy="278" rx="12" ry="4" fill="#E8B89A"/>
    </g>

    <!-- RIGHT FIGHTER (blue belt, facing left, defending with sleeve grip) -->
    <g transform="translate(245 60)">
      <!-- Hair ponytail back -->
      <path d="M82 18 Q 96 32 94 70 Q 92 95 82 110 L 68 105 Q 72 80 69 60 Q 66 38 62 22 Z" fill="#3A1F0E"/>
      <!-- Head -->
      <ellipse cx="60" cy="34" rx="22" ry="24" fill="#EAB89A"/>
      <!-- Hair top -->
      <path d="M38 22 Q 60 6 82 22 Q 82 32 76 40 Q 72 22 60 20 Q 46 22 42 36 Q 38 30 38 22 Z" fill="#3A1F0E"/>
      <!-- Eye -->
      <ellipse cx="50" cy="34" rx="2.2" ry="2.8" fill="#1A0A12"/>
      <!-- Brow -->
      <path d="M44 28 L 54 28" stroke="#3A1F0E" stroke-width="2" stroke-linecap="round"/>
      <!-- Mouth -->
      <path d="M44 46 L 54 45" stroke="#5C1A2B" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <!-- Neck -->
      <rect x="52" y="54" width="16" height="14" fill="#EAB89A"/>

      <!-- GI back sleeve (right arm posting back / counter-grip) -->
      <path d="M88 78 Q 104 95 114 130 L 98 138 Q 86 110 76 88 Z" fill="#FBF3E0" stroke="#C8BFA5" stroke-width="1.2"/>
      <!-- back hand -->
      <ellipse cx="108" cy="135" rx="10" ry="8" fill="#EAB89A"/>

      <!-- GI torso -->
      <path d="M38 70 Q 60 64 82 70 L 90 178 Q 88 184 82 186 L 38 186 Q 32 184 30 178 Z" fill="#FBF3E0" stroke="#C8BFA5" stroke-width="1.5"/>
      <!-- lapel V -->
      <path d="M46 70 L 60 116 L 74 70" fill="#E8DEC0" opacity="0.7"/>
      <path d="M46 70 L 60 116 L 74 70" fill="none" stroke="#C8BFA5" stroke-width="1.5"/>

      <!-- GI forward sleeve (left arm reaching across to grip opponent's sleeve) -->
      <path d="M38 88 Q -5 98 -55 116 L -50 134 Q 0 120 42 108 Z" fill="#FBF3E0" stroke="#C8BFA5" stroke-width="1.2"/>
      <!-- forward hand gripping opponent's sleeve area -->
      <ellipse cx="-58" cy="125" rx="11" ry="9" fill="#EAB89A"/>

      <!-- belt (BLUE) -->
      <rect x="30" y="162" width="60" height="14" fill="#1F3F6B"/>
      <rect x="30" y="162" width="60" height="2" fill="#0F244A"/>
      <rect x="30" y="174" width="60" height="2" fill="#0F244A"/>
      <rect x="54" y="159" width="12" height="20" fill="#1F3F6B"/>
      <rect x="54" y="159" width="12" height="20" fill="none" stroke="#0F244A" stroke-width="1"/>

      <!-- pants -->
      <path d="M38 186 L 30 274 L 48 276 L 56 204 Z" fill="#FBF3E0" stroke="#C8BFA5" stroke-width="1.2"/>
      <path d="M64 204 L 72 276 L 90 274 L 82 186 Z" fill="#FBF3E0" stroke="#C8BFA5" stroke-width="1.2"/>
      <!-- feet -->
      <ellipse cx="40" cy="278" rx="12" ry="4" fill="#EAB89A"/>
      <ellipse cx="81" cy="278" rx="12" ry="4" fill="#EAB89A"/>
    </g>

    <text x="212" y="395" text-anchor="middle" fill="#3F0F1C" font-size="32" font-weight="800" letter-spacing="6">JUJITSU</text>
  </g>

  <!-- RIGHT PANEL: HANDGUN SAFETY - polished illustration -->
  <g transform="translate(565 670)">
    <rect width="425" height="425" rx="20" ry="20" fill="#F5EBD8"/>

    <!-- subtle range floor + faint target silhouette -->
    <rect x="0" y="290" width="425" height="70" fill="#D9CDB2" opacity="0.5"/>
    <!-- distant target rings (top-right corner, very faded) -->
    <g opacity="0.18" transform="translate(330 75)">
      <circle cx="0" cy="0" r="36" fill="none" stroke="#3F0F1C" stroke-width="2"/>
      <circle cx="0" cy="0" r="26" fill="none" stroke="#3F0F1C" stroke-width="2"/>
      <circle cx="0" cy="0" r="16" fill="none" stroke="#3F0F1C" stroke-width="2"/>
      <circle cx="0" cy="0" r="6" fill="#5C1A2B"/>
    </g>

    <g transform="translate(40 50)">
      <!-- LEGS (athletic stance) -->
      <!-- back leg (planted) -->
      <path d="M90 195 Q 80 235 75 295 L 100 305 L 115 305 Q 113 245 115 198 Z" fill="#1A0A12"/>
      <!-- front leg (slightly forward) -->
      <path d="M138 195 Q 148 240 155 300 L 178 308 L 195 304 Q 183 245 175 198 Z" fill="#1A0A12"/>
      <!-- shoe outlines -->
      <ellipse cx="107" cy="306" rx="22" ry="6" fill="#0A0509"/>
      <ellipse cx="186" cy="306" rx="22" ry="6" fill="#0A0509"/>

      <!-- TORSO (athletic top, burgundy) -->
      <path d="M82 100 Q 132 88 188 100 L 198 200 Q 175 215 135 215 Q 95 215 78 200 Z" fill="#5C1A2B"/>
      <!-- subtle highlight -->
      <path d="M132 92 Q 135 150 138 210" stroke="#7B2A40" stroke-width="2" fill="none" opacity="0.5"/>

      <!-- HEAD + HAIR -->
      <!-- back hair / ponytail -->
      <path d="M108 50 Q 90 75 92 115 Q 95 130 105 132 L 116 128 Q 114 100 118 75 Z" fill="#2C1810"/>
      <!-- head (slight 3/4) -->
      <ellipse cx="132" cy="62" rx="24" ry="27" fill="#E8B89A"/>
      <!-- hair top -->
      <path d="M110 48 Q 132 30 156 48 Q 158 60 152 70 Q 148 50 132 48 Q 118 50 114 64 Q 110 58 110 48 Z" fill="#2C1810"/>
      <!-- eye glasses hint behind lens -->
      <ellipse cx="142" cy="60" rx="3" ry="2.5" fill="#1A0A12"/>
      <!-- mouth focused -->
      <path d="M140 76 L 150 75" stroke="#5C1A2B" stroke-width="1.5" stroke-linecap="round"/>

      <!-- EAR PROTECTION (over-ear muffs) -->
      <!-- headband -->
      <path d="M114 38 Q 132 22 150 38" fill="none" stroke="#1A0A12" stroke-width="4" stroke-linecap="round"/>
      <!-- ear cup (visible on near side) -->
      <ellipse cx="116" cy="60" rx="11" ry="14" fill="#1A0A12"/>
      <ellipse cx="116" cy="60" rx="8" ry="11" fill="#3F0F1C"/>

      <!-- SAFETY GLASSES (gold-tinted) -->
      <rect x="124" y="54" width="34" height="12" rx="3" fill="#C9A961" opacity="0.65"/>
      <rect x="124" y="54" width="34" height="12" rx="3" fill="none" stroke="#1A0A12" stroke-width="1.5"/>
      <line x1="124" y1="58" x2="120" y2="58" stroke="#1A0A12" stroke-width="1.5"/>

      <!-- NECK -->
      <rect x="124" y="86" width="16" height="14" fill="#E8B89A"/>

      <!-- ARMS extended forward in isosceles stance -->
      <!-- back arm (shoulder to elbow to wrist) -->
      <path d="M165 108 Q 210 118 258 132 L 263 148 Q 215 138 162 126 Z" fill="#5C1A2B" opacity="0.92"/>
      <!-- back forearm continuation, slightly bent -->
      <path d="M256 130 Q 280 138 300 148 L 302 162 Q 282 152 254 144 Z" fill="#E8B89A"/>
      <!-- front arm -->
      <path d="M155 118 Q 205 126 256 138 L 260 154 Q 210 144 152 134 Z" fill="#5C1A2B"/>
      <!-- front forearm -->
      <path d="M254 138 Q 282 148 304 158 L 304 172 Q 282 162 252 152 Z" fill="#E8B89A"/>

      <!-- HANDS gripping pistol -->
      <ellipse cx="304" cy="161" rx="14" ry="11" fill="#E8B89A"/>
      <ellipse cx="304" cy="170" rx="13" ry="9" fill="#D9A88A"/>

      <!-- PISTOL - compact semi-auto, gunmetal -->
      <!-- slide -->
      <rect x="316" y="148" width="56" height="16" rx="2" fill="#2A2A2A"/>
      <rect x="316" y="148" width="56" height="3" fill="#3F3F3F"/>
      <rect x="316" y="161" width="56" height="3" fill="#1A1A1A"/>
      <!-- slide serrations -->
      <line x1="320" y1="151" x2="320" y2="162" stroke="#1A1A1A" stroke-width="1"/>
      <line x1="324" y1="151" x2="324" y2="162" stroke="#1A1A1A" stroke-width="1"/>
      <line x1="328" y1="151" x2="328" y2="162" stroke="#1A1A1A" stroke-width="1"/>
      <!-- front sight -->
      <rect x="368" y="143" width="4" height="6" fill="#2A2A2A"/>
      <!-- rear sight -->
      <rect x="318" y="143" width="4" height="6" fill="#2A2A2A"/>
      <!-- muzzle -->
      <rect x="370" y="152" width="4" height="8" fill="#1A1A1A"/>
      <!-- frame/grip going into hands -->
      <path d="M316 164 L 328 164 L 332 192 L 308 192 Z" fill="#2A2A2A"/>
      <!-- trigger guard -->
      <path d="M322 166 L 344 166 L 344 178 L 336 178 L 333 174 L 322 174 Z" fill="#F5EBD8"/>
      <!-- trigger -->
      <rect x="338" y="167" width="3" height="9" fill="#2A2A2A"/>
      <!-- magazine baseplate hint -->
      <rect x="308" y="190" width="24" height="4" fill="#1A1A1A"/>
    </g>

    <text x="212" y="395" text-anchor="middle" fill="#3F0F1C" font-size="28" font-weight="800" letter-spacing="5">HANDGUN SAFETY</text>
  </g>

  <!-- PILLS -->
  <g>
    <rect x="160" y="1130" width="285" height="50" rx="25" ry="25" fill="#E8C5C5"/>
    <text x="302" y="1162" text-anchor="middle" fill="#3F0F1C" font-size="20" font-weight="700" letter-spacing="4">PRIVATE LESSONS</text>

    <rect x="635" y="1130" width="285" height="50" rx="25" ry="25" fill="#E8C5C5"/>
    <text x="777" y="1162" text-anchor="middle" fill="#3F0F1C" font-size="20" font-weight="700" letter-spacing="4">GROUP CLASSES</text>
  </g>

  <!-- LOCATION ROW -->
  <g>
    <rect x="293" y="1244" width="14" height="14" fill="#C9A961" transform="rotate(45 300 1251)"/>
    <text x="540" y="1258" text-anchor="middle" fill="#F5EBD8" font-size="32" font-weight="700" letter-spacing="8">LAKEWOOD, NJ</text>
    <rect x="773" y="1244" width="14" height="14" fill="#C9A961" transform="rotate(45 780 1251)"/>
  </g>

  <!-- CARDS -->
  <g transform="translate(90 1310)">
    <!-- left card -->
    <rect x="0" y="22" width="425" height="220" rx="16" ry="16" fill="#F5EBD8"/>
    <circle cx="212" cy="22" r="26" fill="#E8C5C5"/>
    <g transform="translate(199 9)" fill="#5C1A2B">
      <path d="M5.5 8.5 C 7 12 10.5 15.5 14 17 L 16 15 C 16.3 14.7 16.7 14.6 17 14.7 C 18 15 19 15.2 20.2 15.2 C 20.7 15.2 21 15.5 21 16 V 18.5 C 21 19 20.7 19.3 20.2 19.3 C 13 19.3 4.7 11 4.7 3.8 C 4.7 3.3 5 3 5.5 3 H 8 C 8.5 3 8.8 3.3 8.8 3.8 C 8.8 4.9 9 6 9.3 7 C 9.4 7.4 9.3 7.7 9 8 Z" transform="scale(1.1)"/>
    </g>
    <text x="212" y="92" text-anchor="middle" fill="#5C1A2B" font-size="20" font-weight="700" letter-spacing="4">JUJITSU INSTRUCTOR</text>
    <text x="212" y="135" text-anchor="middle" fill="#1A0A12" font-size="36" font-weight="800">Chana Garnick</text>
    <text x="212" y="165" text-anchor="middle" fill="#5C1A2B" font-size="20" font-style="italic">Purple Belt</text>
    <text x="212" y="215" text-anchor="middle" fill="#1A0A12" font-size="32" font-weight="800">(732) 239-3112</text>

    <!-- right card -->
    <g transform="translate(475 0)">
      <rect x="0" y="22" width="425" height="220" rx="16" ry="16" fill="#F5EBD8"/>
      <circle cx="212" cy="22" r="26" fill="#E8C5C5"/>
      <g transform="translate(199 9)" fill="#5C1A2B">
        <path d="M5.5 8.5 C 7 12 10.5 15.5 14 17 L 16 15 C 16.3 14.7 16.7 14.6 17 14.7 C 18 15 19 15.2 20.2 15.2 C 20.7 15.2 21 15.5 21 16 V 18.5 C 21 19 20.7 19.3 20.2 19.3 C 13 19.3 4.7 11 4.7 3.8 C 4.7 3.3 5 3 5.5 3 H 8 C 8.5 3 8.8 3.3 8.8 3.8 C 8.8 4.9 9 6 9.3 7 C 9.4 7.4 9.3 7.7 9 8 Z" transform="scale(1.1)"/>
      </g>
      <text x="212" y="92" text-anchor="middle" fill="#5C1A2B" font-size="20" font-weight="700" letter-spacing="4">FIREARMS INSTRUCTOR</text>
      <text x="212" y="135" text-anchor="middle" fill="#1A0A12" font-size="36" font-weight="800">Yael Quittner</text>
      <text x="212" y="165" text-anchor="middle" fill="#5C1A2B" font-size="20" font-style="italic">USCCA Certified</text>
      <text x="212" y="215" text-anchor="middle" fill="#1A0A12" font-size="32" font-weight="800">(347) 232-9000</text>
    </g>
  </g>

  <!-- Contact row -->
  <text x="540" y="1620" text-anchor="middle" fill="#F5EBD8" font-size="22" letter-spacing="11" font-weight="500">CALL  •  TEXT  •  WHATSAPP</text>

  <!-- Bottom band -->
  <line x1="90" y1="1680" x2="990" y2="1680" stroke="#C9A961" stroke-opacity="0.7" stroke-width="1"/>
  <text x="540" y="1750" text-anchor="middle" fill="#F5EBD8" font-size="44" font-weight="800" letter-spacing="3">EMPOWERING WOMEN</text>
  <text x="540" y="1805" text-anchor="middle" fill="#F5EBD8" font-size="44" font-weight="800" letter-spacing="3">TO PROTECT THEMSELVES</text>
  <line x1="90" y1="1840" x2="990" y2="1840" stroke="#C9A961" stroke-opacity="0.7" stroke-width="1"/>

</svg>
